services:
  mcp:
    build: ./mcp_server
    env_file: ./mcp_server/.env
    environment:
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run --token ${CF_TUNNEL_TOKEN}
    environment:
      - CF_TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - mcp
    networks:
      - internal

  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notion_mcp
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./mcp_server/01_init_user.sh:/docker-entrypoint-initdb.d/01_init_user.sh:ro
      - ./mcp_server/schema.sql:/docker-entrypoint-initdb.d:ro
    # SECURITY: Port 5433 is NOT published to host in production
    # Database is only accessible via internal Docker network
    # For local dev/testing, use: docker exec -it notionmcp-db-1 psql -U postgres -d notion_mcp
    ports:
      - "5433:5432" # Expose Postgres/pgvector on 5433 (host) -> 5432 (container)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notion_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    profiles:
      - scale
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  pgdata:
  redisdata:
